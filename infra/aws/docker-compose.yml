services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - core-web
      - wholesaler-web
      - customer-web
    restart: unless-stopped

  api:
    image: ghcr.io/johanloperez/som-api:latest
    environment:
      - ConnectionStrings__CoreDb=${CORE_DB}
      - ConnectionStrings__TenantTemplateDb=${TENANT_TEMPLATE_DB}
      - Jwt__Key=${JWT_KEY}
      - CorsOrigins=http://${DOMAIN},http://core.${DOMAIN},http://wholesaler.${DOMAIN},http://customer.${DOMAIN}
    restart: unless-stopped

  core-web:
    image: ghcr.io/johanloperez/som-core:latest
    environment:
      - NEXT_PUBLIC_API_URL=http://${DOMAIN}/api/v1
      - NEXT_PUBLIC_PORTAL=core
      - PORT=3000
    restart: unless-stopped

  wholesaler-web:
    image: ghcr.io/johanloperez/som-wholesaler:latest
    environment:
      - NEXT_PUBLIC_API_URL=http://${DOMAIN}/api/v1
      - NEXT_PUBLIC_PORTAL=wholesaler
      - PORT=3000
    restart: unless-stopped

  customer-web:
    image: ghcr.io/johanloperez/som-customer:latest
    environment:
      - NEXT_PUBLIC_API_URL=http://${DOMAIN}/api/v1
      - NEXT_PUBLIC_PORTAL=customer
      - PORT=3000
    restart: unless-stopped
