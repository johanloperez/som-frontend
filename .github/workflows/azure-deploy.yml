name: Deploy Frontend to Azure

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy-core:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://wholesale-platform-api-bkdxfzcjhwb8bef3.spaincentral-01.azurewebsites.net/api/v1
      NEXT_PUBLIC_PORTAL: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx turbo run generate:types

      - run: npx turbo build --filter=core-web

      - run: |
          $app = "core"
          $standalone = "apps/$app/.next/standalone"
          $items = Get-ChildItem -Path "$standalone/apps/$app"
          if ($items) { $items | Move-Item -Destination "$standalone" }
          Remove-Item -Recurse -Force "$standalone/apps" -ErrorAction SilentlyContinue
          if (Test-Path "apps/$app/.next/static") {
            New-Item -ItemType Directory -Force -Path "$standalone/.next" | Out-Null
            Copy-Item -Recurse -Path "apps/$app/.next/static" -Destination "$standalone/.next/static"
          }
          if (Test-Path "apps/$app/public") { Copy-Item -Recurse -Path "apps/$app/public" -Destination "$standalone/public" }
          Set-Content -Path "$standalone/web.config" -Value @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <handlers>
                <add name="iisnode" path="server.js" verb="*" modules="iisnode" />
              </handlers>
              <rewrite>
                <rules>
                  <rule name="StaticContent" stopProcessing="true">
                    <match url=".*" />
                    <conditions logicalGrouping="MatchAll">
                      <add input="{REQUEST_FILENAME}" matchType="IsFile" />
                    </conditions>
                    <action type="None" />
                  </rule>
                  <rule name="DynamicContent" stopProcessing="true">
                    <match url=".*" />
                    <conditions logicalGrouping="MatchAll">
                      <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="true" />
                    </conditions>
                    <action type="Rewrite" url="server.js" />
                  </rule>
                </rules>
              </rewrite>
              <iisnode loggingEnabled="true" devErrorsEnabled="true" />
            </system.webServer>
          </configuration>
          "@
          Compress-Archive -Path "$standalone/*" -DestinationPath ${{ runner.temp }}/$app.zip
        shell: pwsh

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - run: |
          az webapp config appsettings set --resource-group wholesale-platform-api_group --name som-core --settings WEBSITE_NODE_DEFAULT_VERSION=~20 SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp restart --resource-group wholesale-platform-api_group --name som-core
          az webapp deploy --resource-group wholesale-platform-api_group --name som-core --src-path ${{ runner.temp }}/core.zip --type zip
        shell: bash

