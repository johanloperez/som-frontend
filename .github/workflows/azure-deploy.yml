name: Deploy Frontend to Azure

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy-core:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://wholesale-platform-api-bkdxfzcjhwb8bef3.spaincentral-01.azurewebsites.net/api/v1
      NEXT_PUBLIC_PORTAL: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx turbo run generate:types

      - run: npx turbo build --filter=core-web

      - run: |
          $standalone = "apps/core/.next/standalone"
          New-Item -ItemType Directory -Force -Path "$standalone/.next" | Out-Null
          cp -r apps/core/.next/static "$standalone/.next/static"
          if (Test-Path apps/core/public) { cp -r apps/core/public "$standalone/public" }
          cd "$standalone"
          npm install --production
          @'
<?xml version="1.0" encoding="utf-8"?>
<configuration>
  <system.webServer>
    <webSocket enabled="false" />
    <handlers>
      <add name="iisnode" path="server.js" verb="*" modules="iisnode" />
    </handlers>
    <rewrite>
      <rules>
        <rule name="StaticContent" stopProcessing="true">
          <match url=".*" />
          <conditions logicalGrouping="MatchAll">
            <add input="{REQUEST_FILENAME}" matchType="IsFile" />
          </conditions>
          <action type="None" />
        </rule>
        <rule name="DynamicContent" stopProcessing="true">
          <match url=".*" />
          <conditions logicalGrouping="MatchAll">
            <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="true" />
          </conditions>
          <action type="Rewrite" url="server.js" />
        </rule>
      </rules>
    </rewrite>
    <security>
      <requestFiltering>
        <hiddenSegments>
          <add segment="node_modules" />
        </hiddenSegments>
      </requestFiltering>
    </security>
  </system.webServer>
</configuration>
'@ | Set-Content -Path "$standalone/web.config" -Encoding UTF8
          Compress-Archive -Path "$standalone/*" -DestinationPath ${{ runner.temp }}/core.zip
        shell: pwsh

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - run: |
          az webapp config appsettings set --resource-group wholesale-platform-api_group --name som-core --settings WEBSITE_NODE_DEFAULT_VERSION=~20 SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp deploy --resource-group wholesale-platform-api_group --name som-core --src-path ${{ runner.temp }}/core.zip --type zip
        shell: bash

  build-and-deploy-wholesaler:
