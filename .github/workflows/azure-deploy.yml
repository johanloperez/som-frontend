name: Deploy Frontend to Azure

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy-core:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://wholesale-platform-api-bkdxfzcjhwb8bef3.spaincentral-01.azurewebsites.net/api/v1
      NEXT_PUBLIC_PORTAL: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx turbo run generate:types

      - run: npx turbo build --filter=core-web

      - run: |
          $app = "core"
          $standalone = "apps/$app/.next/standalone"
          $appDir = "$standalone/apps/$app"
          New-Item -ItemType Directory -Force -Path "$appDir/.next" | Out-Null
          if (Test-Path "apps/$app/.next/static") { Copy-Item -Recurse -Path "apps/$app/.next/static" -Destination "$appDir/.next/static" }
          if (Test-Path "apps/$app/public") { Copy-Item -Recurse -Path "apps/$app/public" -Destination "$appDir/public" }
          Set-Content -Path "$standalone/web.config" -Value @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <httpPlatform processPath="node" arguments="apps/$app/server.js" stdoutLogEnabled="true" stdoutLogFile=".\logs\node-stdout.log" startupTimeLimit="120" requestTimeout="00:04:00" />
            </system.webServer>
          </configuration>
          "@
          Compress-Archive -Path "$standalone/*" -DestinationPath ${{ runner.temp }}/$app.zip
        shell: pwsh

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - run: |
          az webapp config appsettings set --resource-group wholesale-platform-api_group --name som-core --settings WEBSITE_NODE_DEFAULT_VERSION=~20 SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp deploy --resource-group wholesale-platform-api_group --name som-core --src-path ${{ runner.temp }}/core.zip --type zip
        shell: bash

  build-and-deploy-wholesaler:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://wholesale-platform-api-bkdxfzcjhwb8bef3.spaincentral-01.azurewebsites.net/api/v1
      NEXT_PUBLIC_PORTAL: wholesaler
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx turbo run generate:types

      - run: npx turbo build --filter=wholesaler-web

      - run: |
          $app = "wholesaler"
          $standalone = "apps/$app/.next/standalone"
          $appDir = "$standalone/apps/$app"
          New-Item -ItemType Directory -Force -Path "$appDir/.next" | Out-Null
          if (Test-Path "apps/$app/.next/static") { Copy-Item -Recurse -Path "apps/$app/.next/static" -Destination "$appDir/.next/static" }
          if (Test-Path "apps/$app/public") { Copy-Item -Recurse -Path "apps/$app/public" -Destination "$appDir/public" }
          Set-Content -Path "$standalone/web.config" -Value @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <httpPlatform processPath="node" arguments="apps/$app/server.js" stdoutLogEnabled="true" stdoutLogFile=".\logs\node-stdout.log" startupTimeLimit="120" requestTimeout="00:04:00" />
            </system.webServer>
          </configuration>
          "@
          Compress-Archive -Path "$standalone/*" -DestinationPath ${{ runner.temp }}/$app.zip
        shell: pwsh

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - run: |
          az webapp config appsettings set --resource-group wholesale-platform-api_group --name som-wholesaler --settings WEBSITE_NODE_DEFAULT_VERSION=~20 SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp deploy --resource-group wholesale-platform-api_group --name som-wholesaler --src-path ${{ runner.temp }}/wholesaler.zip --type zip
        shell: bash

  build-and-deploy-customer:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://wholesale-platform-api-bkdxfzcjhwb8bef3.spaincentral-01.azurewebsites.net/api/v1
      NEXT_PUBLIC_PORTAL: customer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx turbo run generate:types

      - run: npx turbo build --filter=customer-web

      - run: |
          $app = "customer"
          $standalone = "apps/$app/.next/standalone"
          $appDir = "$standalone/apps/$app"
          New-Item -ItemType Directory -Force -Path "$appDir/.next" | Out-Null
          if (Test-Path "apps/$app/.next/static") { Copy-Item -Recurse -Path "apps/$app/.next/static" -Destination "$appDir/.next/static" }
          if (Test-Path "apps/$app/public") { Copy-Item -Recurse -Path "apps/$app/public" -Destination "$appDir/public" }
          Set-Content -Path "$standalone/web.config" -Value @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <httpPlatform processPath="node" arguments="apps/$app/server.js" stdoutLogEnabled="true" stdoutLogFile=".\logs\node-stdout.log" startupTimeLimit="120" requestTimeout="00:04:00" />
            </system.webServer>
          </configuration>
          "@
          Compress-Archive -Path "$standalone/*" -DestinationPath ${{ runner.temp }}/$app.zip
        shell: pwsh

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - run: |
          az webapp config appsettings set --resource-group wholesale-platform-api_group --name som-customer --settings WEBSITE_NODE_DEFAULT_VERSION=~20 SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp deploy --resource-group wholesale-platform-api_group --name som-customer --src-path ${{ runner.temp }}/customer.zip --type zip
        shell: bash
